<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso Administración — MBS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #0b1e3d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }
    .logo-mark {
      width: 56px; height: 56px;
      background: #0b1e3d;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 800; color: #fff;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }
    .logo h1 { font-size: 1.25rem; color: #0b1e3d; font-weight: 700; }
    .logo p  { font-size: .8rem; color: #64748b; margin-top: 2px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: .82rem; font-weight: 600; color: #334155; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: .9rem; font-family: inherit; color: #0f172a;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { outline: none; border-color: #0b1e3d; box-shadow: 0 0 0 3px rgba(11,30,61,.1); }
    .btn {
      width: 100%; padding: 13px;
      background: #f97316; color: #fff;
      border: none; border-radius: 8px;
      font-size: .95rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: background .15s;
      margin-top: 4px;
    }
    .btn:hover { background: #ea6c0a; }
    .btn:disabled { opacity: .65; cursor: not-allowed; }
    .error-msg {
      display: none;
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; padding: 10px 14px;
      color: #dc2626; font-size: .85rem; margin-bottom: 14px;
      text-align: center;
    }
    .error-msg.show { display: block; }
    .footer-note {
      margin-top: 20px; text-align: center;
      font-size: .78rem; color: #94a3b8;
    }
    .footer-note a { color: #0b1e3d; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">M</div>
    <h1>MBS Comunicaciones</h1>
    <p>Panel de Administración</p>
  </div>

  <div class="error-msg" id="err-msg">Credenciales incorrectas</div>

  <div class="field">
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="admin@mbs.mx" autocomplete="email">
  </div>
  <div class="field">
    <label for="pass">Contraseña</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="btn-login" onclick="doLogin()">Iniciar sesión</button>

  <div class="footer-note">
    <a href="/">← Ir al sitio de clientes</a>
  </div>
</div>

<script>
const ADMIN_TOKEN_KEY = 'mbs_admin_token';
const ADMIN_USER_KEY  = 'mbs_admin_user';

// Si ya hay sesión admin válida, redirigir al panel
(function() {
  const t = localStorage.getItem(ADMIN_TOKEN_KEY);
  const u = JSON.parse(localStorage.getItem(ADMIN_USER_KEY) || 'null');
  if (t && u && ['admin','superadmin'].includes(u.rol)) {
    window.location.href = '/admin/index.html';
  }
})();

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('btn-login');
  const err   = document.getElementById('err-msg');

  err.classList.remove('show');

  if (!email || !pass) {
    err.textContent = 'Ingresa tu correo y contraseña';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Verificando...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();

    if (!data.ok) {
      err.textContent = data.mensaje || 'Credenciales incorrectas';
      err.classList.add('show');
      return;
    }

    if (!['admin','superadmin'].includes(data.usuario?.rol)) {
      err.textContent = 'No tienes permisos de administrador';
      err.classList.add('show');
      return;
    }

    // Guardar en claves EXCLUSIVAS del admin
    localStorage.setItem(ADMIN_TOKEN_KEY, data.token);
    localStorage.setItem(ADMIN_USER_KEY, JSON.stringify(data.usuario));

    window.location.href = '/admin/index.html';
  } catch (e) {
    err.textContent = 'Error de conexión con el servidor';
    err.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Iniciar sesión';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña — MBS Comunicaciones</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <style>
    .recover-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .recover-card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-md);
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-md);
    }
    .recover-card__logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .recover-card__logo-mark {
      width: 52px; height: 52px;
      background: var(--navy);
      border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem; font-weight: 700; color: var(--white);
      margin-bottom: 8px;
    }
    .recover-card h2 {
      font-size: 1.3rem; color: var(--navy);
      text-align: center; margin-bottom: 6px;
    }
    .recover-card p {
      text-align: center; color: var(--gray-600);
      font-size: .88rem; margin-bottom: 24px; line-height: 1.5;
    }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: .85rem; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--gray-100); border-radius: var(--radius-sm);
      font-size: .9rem; font-family: inherit; transition: var(--transition);
    }
    .form-input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(11,30,61,.08); }
    .btn-recover {
      width: 100%; padding: 12px;
      background: var(--navy); color: var(--white);
      border: none; border-radius: var(--radius-sm);
      font-size: .95rem; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: var(--transition); margin-bottom: 14px;
    }
    .btn-recover:hover { background: var(--electric); }
    .btn-recover:disabled { opacity: .7; cursor: not-allowed; }
    .success-box {
      display: none;
      background: var(--green-lite);
      border: 1px solid rgba(46,125,50,.2);
      border-radius: var(--radius-sm);
      padding: 16px; text-align: center;
      color: var(--green); font-size: .9rem; margin-bottom: 16px;
    }
    .success-box.visible { display: block; }
    .wa-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #25D366; color: #fff;
      border-radius: var(--radius-sm); padding: 11px;
      font-weight: 700; font-size: .9rem; text-decoration: none;
      transition: var(--transition); margin-bottom: 14px;
    }
    .wa-btn:hover { background: #1ebe5d; }
    .back-link { text-align: center; font-size: .85rem; color: var(--gray-600); }
    .back-link a { color: var(--electric); }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="navbar__inner">
      <a href="/" class="navbar__logo"><span class="navbar__logo-text">MBS</span></a>
      <div class="navbar__actions" id="navbar-actions"></div>
    </div>
  </div>
</nav>

<div class="recover-page">
  <div class="recover-card">
    <div class="recover-card__logo">
      <div class="recover-card__logo-mark">M</div>
    </div>
    <h2>¿Olvidaste tu contraseña?</h2>
    <p>Ingresa tu correo y te enviaremos instrucciones para recuperar el acceso a tu cuenta.</p>

    <div class="success-box" id="success-box">
      ✓ Te enviaremos un correo con un enlace para restablecer tu contraseña.
    </div>

    <div id="form-section">
      <div class="form-group">
        <label class="form-label" for="rec-email">Correo electrónico</label>
        <input type="email" class="form-input" id="rec-email"
          placeholder="tu@empresa.com" autocomplete="email">
      </div>
      <button class="btn-recover" id="btn-recover" onclick="solicitarRecuperacion()">
        Enviar instrucciones
      </button>

      <a href="https://wa.me/527713455929?text=Hola, olvidé mi contraseña y necesito recuperar el acceso a mi cuenta MBS."
         class="wa-btn" target="_blank">
        💬 Recuperar por WhatsApp
      </a>
    </div>

    <div class="back-link">
      <a href="/pages/login.html">← Volver al inicio de sesión</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/global.js"></script>
<script>
async function solicitarRecuperacion() {
  const email = document.getElementById('rec-email').value.trim();
  if (!email) { Toast.show('Ingresa tu correo electrónico', 'error'); return; }
  const btn = document.getElementById('btn-recover');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  const res = await fetch('/api/auth/recuperar', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  }).then(r => r.json()).catch(() => ({ ok: false, mensaje: 'Error de conexión' }));

  btn.disabled = false;
  btn.textContent = 'Enviar instrucciones';

  if (res.ok) {
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('success-box').classList.add('visible');
    document.getElementById('success-box').innerHTML =
      '✓ Si el correo <strong>' + email + '</strong> está registrado, te enviamos un enlace para restablecer tu contraseña.<br><br>' +
      'Revisa tu bandeja de entrada (y la carpeta de spam). El enlace te llevará directo a la ' +
      '<a href="/pages/reset-password.html" style="color:var(--green)">página de restablecimiento</a> con el token ya cargado.<br><br>' +
      '¿No te llegó? Contáctanos por ' +
      '<a href="https://wa.me/527713455929?text=Hola, solicité recuperar mi contraseña con el correo ' + encodeURIComponent(email) + '" style="color:var(--green)" target="_blank">WhatsApp</a>.';
  } else {
    Toast.show(res.mensaje || 'Error al procesar la solicitud', 'error');
  }
}

document.getElementById('rec-email')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') solicitarRecuperacion();
});
</script>
</body>
</html>

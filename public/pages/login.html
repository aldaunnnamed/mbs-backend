<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — MBS Comunicaciones</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <style>
    .auth-page {
      min-height: calc(100vh - 64px);
      background: var(--gray-50);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }
    .auth-card__header {
      background: var(--navy);
      padding: 32px;
      text-align: center;
    }
    .auth-card__logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }
    .auth-card__subtitle {
      font-size: .85rem;
      color: rgba(255,255,255,.55);
    }
    .auth-card__body { padding: 32px; }
    .auth-card__title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem;
      color: var(--navy);
      margin-bottom: 24px;
      text-align: center;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-sm);
      font-size: .9rem;
      font-family: inherit;
      transition: var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(11,30,61,.08);
    }
    .form-input.error { border-color: var(--red); }
    .form-error {
      font-size: .78rem;
      color: var(--red);
      margin-top: 4px;
      display: none;
    }
    .form-error.visible { display: block; }
    .forgot-link {
      display: block;
      text-align: right;
      font-size: .82rem;
      color: var(--electric);
      margin-top: 4px;
      text-decoration: none;
    }
    .forgot-link:hover { text-decoration: underline; }
    .btn-auth {
      width: 100%;
      padding: 13px;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 8px;
    }
    .btn-auth:hover { background: var(--orange-lite); transform: translateY(-1px); }
    .btn-auth:disabled { opacity: .7; cursor: not-allowed; transform: none; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--gray-400);
      font-size: .82rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-100);
    }
    .auth-footer {
      text-align: center;
      font-size: .85rem;
      color: var(--gray-600);
      padding: 16px 32px 24px;
      border-top: 1px solid var(--gray-100);
    }
    .auth-footer a { color: var(--electric); font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
    .alert-error {
      background: var(--red-lite);
      border: 1px solid rgba(198,40,40,.2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: .85rem;
      color: var(--red);
      margin-bottom: 16px;
      display: none;
    }
    .alert-error.visible { display: block; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="navbar__inner">
      <a href="/" class="navbar__logo"><span class="navbar__logo-text">MBS</span></a>
      <div style="flex:1"></div>
      <a href="/pages/registro.html"
        style="color:rgba(255,255,255,.7);font-size:.9rem;margin-right:16px">
        ¿No tienes cuenta? <strong style="color:var(--orange)">Regístrate</strong>
      </a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <div class="auth-card__logo">MBS</div>
      <div class="auth-card__subtitle">Insumos de fibra óptica para profesionales</div>
    </div>

    <div class="auth-card__body">
      <h2 class="auth-card__title">Iniciar sesión</h2>

      <div class="alert-error" id="alert-error"></div>

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input type="email" class="form-input" id="email"
          placeholder="tu@empresa.com" autocomplete="email">
        <span class="form-error" id="email-error">Ingresa un correo válido</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input type="password" class="form-input" id="password"
          placeholder="••••••••" autocomplete="current-password">
        <a href="/pages/recuperar-password.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
        <span class="form-error" id="pass-error">Ingresa tu contraseña</span>
      </div>

      <button class="btn-auth" id="btn-login" onclick="doLogin()">
        Iniciar sesión
      </button>
    </div>

    <div class="auth-footer">
      ¿No tienes cuenta?
      <a href="/pages/registro.html">Crear cuenta gratis</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/js/global.js?v=3"></script>
<script>
  // Si ya está logueado, redirigir
  if (Session.isLoggedIn()) {
    const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
    window.location.href = redirect;
  }

  window.doLogin = async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-login');
    const alert    = document.getElementById('alert-error');

    // Validaciones
    let hasError = false;
    if (!email || !email.includes('@')) {
      document.getElementById('email-error').classList.add('visible');
      document.getElementById('email').classList.add('error');
      hasError = true;
    } else {
      document.getElementById('email-error').classList.remove('visible');
      document.getElementById('email').classList.remove('error');
    }
    if (!password) {
      document.getElementById('pass-error').classList.add('visible');
      document.getElementById('password').classList.add('error');
      hasError = true;
    } else {
      document.getElementById('pass-error').classList.remove('visible');
      document.getElementById('password').classList.remove('error');
    }
    if (hasError) return;

    btn.disabled = true;
    btn.textContent = 'Iniciando sesión...';
    alert.classList.remove('visible');

    try {
      const data = await API.post('/auth/login', { email, password });

      if (data.ok) {
        Session.login(data.token, data.usuario);
        Toast.show('Bienvenido, ' + data.usuario.nombre, 'success');

        // Redirigir según rol
        const redirect = new URLSearchParams(window.location.search).get('redirect');
        if (redirect) {
          window.location.href = redirect;
        } else if (data.usuario.rol === 'admin' || data.usuario.rol === 'superadmin') {
          window.location.href = '/admin/';
        } else {
          window.location.href = '/';
        }
      } else {
        alert.textContent = data.mensaje || 'Credenciales incorrectas';
        alert.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    } catch (err) {
      alert.textContent = 'Error de conexión. Intenta de nuevo.';
      alert.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
    }
  };

  // Enter para submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago con Mercado Pago — MBS Comunicaciones</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <style>
    .mp-page{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 16px}
    .mp-card{background:var(--white);border:1px solid var(--gray-100);border-radius:var(--radius-md);padding:40px 36px;max-width:440px;width:100%;box-shadow:var(--shadow-md);text-align:center}
    .mp-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.8rem}
    .mp-icon.loading{background:var(--gray-50);color:var(--navy)}
    .mp-icon.success{background:var(--green-lite);color:var(--green)}
    .mp-icon.pending{background:#fff8e1;color:#f9a825}
    .mp-icon.error{background:#fff0f0;color:#c62828}
    .mp-card h2{font-size:1.3rem;color:var(--navy);margin-bottom:8px}
    .mp-card p{color:var(--gray-600);font-size:.9rem;line-height:1.5;margin-bottom:20px}
    .mp-detail{background:var(--gray-50);border-radius:var(--radius-sm);padding:14px;font-size:.85rem;margin-bottom:20px;text-align:left}
    .mp-detail-row{display:flex;justify-content:space-between;padding:3px 0}
    .mp-detail-row span:first-child{color:var(--gray-600)}
    .mp-detail-row span:last-child{font-weight:700;color:var(--navy)}
    .mp-btns{display:flex;flex-direction:column;gap:10px}
    .spinner{width:36px;height:36px;border:3px solid var(--gray-100);border-top-color:#009ee3;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container">
    <div class="navbar__inner">
      <a href="/" class="navbar__logo"><span class="navbar__logo-text">MBS</span></a>
      <div class="navbar__actions" id="navbar-actions"></div>
    </div>
  </div>
</nav>

<div class="mp-page">
  <div class="mp-card">
    <div class="mp-icon loading" id="mp-icon"><div class="spinner"></div></div>
    <h2 id="mp-title">Verificando tu pago...</h2>
    <p id="mp-desc">Estamos confirmando tu pago con Mercado Pago. Esto solo toma un momento.</p>

    <div class="mp-detail" id="mp-detail" style="display:none">
      <div class="mp-detail-row"><span>Pedido</span><span id="mp-pedido">—</span></div>
      <div class="mp-detail-row"><span>Estado del pago</span><span id="mp-estado">—</span></div>
    </div>

    <div class="mp-btns" id="mp-btns" style="display:none"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/global.js?v=4"></script>
<script>
// Mercado Pago añade estos parámetros al back_url:
// collection_id, collection_status, payment_id, status, external_reference,
// payment_type, merchant_order_id, preference_id
const params          = new URLSearchParams(window.location.search);
const pedidoId        = params.get('pedido_id') || params.get('external_reference');
const collectionStatus = params.get('collection_status') || params.get('status') || '';
const myStatus        = params.get('status') || '';

const setIcon = (tipo, contenido) => {
  const icon = document.getElementById('mp-icon');
  icon.className = 'mp-icon ' + tipo;
  icon.innerHTML = contenido;
};

const showButtons = (html) => {
  const c = document.getElementById('mp-btns');
  c.innerHTML = html;
  c.style.display = 'flex';
};

const mostrarExito = () => {
  setIcon('success', '✓');
  document.getElementById('mp-title').textContent = '¡Pago recibido!';
  document.getElementById('mp-desc').textContent = 'Tu pago con Mercado Pago fue procesado correctamente.';
  if (pedidoId) document.getElementById('mp-pedido').textContent = '#' + pedidoId;
  document.getElementById('mp-estado').textContent = 'Aprobado';
  document.getElementById('mp-detail').style.display = 'block';
  showButtons(`
    <a href="/pages/mis-pedidos.html" class="btn btn-primary">Ver mis pedidos</a>
    <a href="/pages/catalogo.html" class="btn btn-outline">Seguir comprando</a>
  `);
  Cart.updateBadge();
};

const mostrarPendiente = () => {
  setIcon('pending', '⏳');
  document.getElementById('mp-title').textContent = 'Pago en proceso';
  document.getElementById('mp-desc').textContent =
    'Tu pago está siendo procesado por Mercado Pago. Recibirás una notificación cuando se confirme.';
  if (pedidoId) document.getElementById('mp-pedido').textContent = '#' + pedidoId;
  document.getElementById('mp-estado').textContent = 'Pendiente';
  document.getElementById('mp-detail').style.display = 'block';
  showButtons(`
    <a href="/pages/mis-pedidos.html" class="btn btn-primary">Ver mis pedidos</a>
    <a href="/pages/catalogo.html" class="btn btn-outline">Seguir comprando</a>
  `);
};

const mostrarFallo = () => {
  setIcon('error', '✕');
  document.getElementById('mp-title').textContent = 'No se completó el pago';
  document.getElementById('mp-desc').textContent =
    'Tu pago con Mercado Pago no se completó. Puedes intentarlo de nuevo o elegir otro método de pago.';
  showButtons(`
    <a href="/pages/mis-pedidos.html" class="btn btn-primary">Ver mis pedidos</a>
    <a href="/pages/catalogo.html" class="btn btn-outline">Seguir comprando</a>
  `);
};

document.addEventListener('DOMContentLoaded', () => {
  const status = collectionStatus || myStatus;

  if (status === 'approved') {
    mostrarExito();
  } else if (status === 'pending' || status === 'in_process') {
    mostrarPendiente();
  } else if (status === 'failure' || status === 'rejected') {
    mostrarFallo();
  } else {
    // Sin parámetros: llegó desde back_url con el status que pusimos nosotros
    const myStatusParam = params.get('status');
    if (myStatusParam === 'success') mostrarExito();
    else if (myStatusParam === 'pending') mostrarPendiente();
    else mostrarFallo();
  }
});
</script>
</body>
</html>
